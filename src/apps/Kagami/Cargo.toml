[package]
name = "kagami"
version = "0.1.0"
edition = "2024"

[dependencies]
wayland-server = "0.31.13"
wayland-protocols = "0.32.12"
wayland-backend = "0.3.15"
swiftlib = { path = "../../user", features = ["std-support"] }

[build-dependencies]
resvg = { version = "0.47.0", default-features = false }

[profile.release]
panic = "abort"

[profile.dev]
panic = "abort"
